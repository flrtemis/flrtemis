    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: black;
            font-family: 'Roboto', sans-serif;
            color: #fff;
            flex-direction: column;
        }
        iframe {
            width: 960px;
            height: 540px;
            border: none;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        .button-container {
            position: relative;
            width: 200px;
            height: 50px;
            margin-top: 20px;
        }
        .button {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #4CAF50;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            outline: none;
            transition: all 0.3s;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .button::before, .button::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            pointer-events: none;
            transition: transform 0.3s;
            transform: translate(-50%, -50%) scale(0);
        }
        .button:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }
        .button:hover::before, .button:hover::after {
            transform: translate(-50%, -50%) scale(1.2);
        }
    </style>
</head>
