<div class="cosmic-bg"></div>

<header class="header">
  <h1>Modern Interactive Buttons</h1>
</header>

<div class="controls">
  <input type="text" id="searchInputEl" placeholder="Search buttons...">
</div>

<div class="cta-container" id="ctaContainerEl"></div>

<style>
  :root {
    --ultra-color: #00ff95;
    --ultra-dark: #000;
    --ultra-glow: rgba(0, 255, 149, 0.3);
    --ultra-shadow: rgba(0, 255, 149, 0.5);
  }

  body {
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: var(--ultra-dark);
    font-family: 'Orbitron', sans-serif;
    color: #fff;
    overflow: hidden;
  }

  .header {
    margin-bottom: 20px;
    text-align: center;
  }

  .header h1 {
    font-size: 2.5rem;
    text-shadow: 0 0 20px var(--ultra-color), 0 0 40px var(--ultra-color);
    animation: pulsate 2s infinite alternate;
  }

  .controls {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
  }

  #searchInputEl {
    padding: 10px;
    margin-right: 10px;
    border: 2px solid var(--ultra-color);
    background: transparent;
    color: var(--ultra-color);
  }

  .controls button {
    padding: 10px;
    margin: 0 5px;
    background: var(--ultra-color);
    color: var(--ultra-dark);
    border: none;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .controls button:hover {
    transform: scale(1.1);
    box-shadow: 0 0 15px var(--ultra-shadow);
  }

  .cta-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    width: 90%;
    max-width: 1200px;
  }

  .cta-button {
    padding: 15px 20px;
    border: 2px solid var(--ultra-color);
    background: transparent;
    color: var(--ultra-color);
    text-transform: uppercase;
    letter-spacing: 2px;
    text-align: center;
    position: relative;
    cursor: pointer;
    transition: all 0.4s ease;
    text-shadow: 0 0 10px var(--ultra-color);
    box-shadow: 0 0 15px var(--ultra-shadow);
    overflow: hidden;
  }

  .cta-button::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, var(--ultra-glow), transparent);
    transition: all 0.4s;
  }

  .cta-button:hover::before {
    left: 100%;
  }

  .cta-button:hover {
    background: var(--ultra-color);
    color: var(--ultra-dark);
    text-shadow: none;
    box-shadow: 0 0 20px var(--ultra-shadow), inset 0 0 20px var(--ultra-shadow);
    transform: scale(1.1) rotate(3deg);
  }

  .cta-tooltip {
    position: absolute;
    bottom: -35px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ultra-color);
    color: var(--ultra-dark);
    padding: 5px 10px;
    border-radius: 5px;
    font-size: 12px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  .cta-button:hover .cta-tooltip {
    opacity: 1;
    animation: float 2s infinite alternate;
  }

  .cosmic-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, #000, #1a292c);
    z-index: -1;
  }

  .star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: #fff;
    border-radius: 50%;
    animation: twinkle 5s infinite ease-in-out;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  @keyframes float {
    0% { transform: translateX(-50%) translateY(0); }
    100% { transform: translateX(-50%) translateY(-10px); }
  }

  @keyframes pulsate {
    0% { text-shadow: 0 0 20px var(--ultra-color), 0 0 40px var(--ultra-color); }
    100% { text-shadow: 0 0 30px var(--ultra-color), 0 0 60px var(--ultra-color); }
  }

  @media (max-width: 768px) {
    .cta-container {
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    }
    .header h1 {
      font-size: 2rem;
    }
    .controls {
      flex-direction: column;
      align-items: center;
    }
    #searchInput, .controls button {
      margin: 5px 0;
      width: 100%;
    }
  }
</style>

<script>
  const buttonsData = [
    { text: "Watch Cartoons", tooltip: "Go to WCOFun", url: "https://www.wcofun.net/" },
    { text: "Google Translate", tooltip: "Translate Languages", url: "https://translate.google.com" },
    { text: "Melodysheep", tooltip: "Visit Melodysheep YouTube", url: "https://www.youtube.com/@melodysheep" },
    { text: "GitHub", tooltip: "Visit GitHub Profile", url: "https://github.com/flrtemis" },
    { text: "ChatGPT", tooltip: "Open ChatGPT", url: "https://chatgpt.com/" },
    { text: "YouTube", tooltip: "Go to YouTube", url: "https://www.youtube.com" },
    { text: "APKMirror", tooltip: "Download APKs", url: "https://www.apkmirror.com/" },
    { text: "APKPure", tooltip: "Explore APKPure", url: "https://apkpure.com/" },
    { text: "MODYOLO", tooltip: "Visit MODYOLO", url: "https://modyolo.com/apps" },
    { text: "Uptodown", tooltip: "Discover Uptodown", url: "https://en.uptodown.com" },
    { text: "Temporary Number", tooltip: "Use Temporary Numbers", url: "https://quackr.io/temporary-numbers/united-states" },
    { text: "Temporary Email", tooltip: "Access Temp Mail", url: "https://temp-mail.org/en/" },
    { text: "Branch Education", tooltip: "Visit Branch Education", url: "https://branch.education/" },
    { text: "Convai", tooltip: "Create with Convai", url: "https://convai.com/pipeline/create-character" },
    { text: "Crushon AI", tooltip: "Explore Crushon AI", url: "https://crushon.ai" },
    { text: "MusicFX", tooltip: "Try Google MusicFX", url: "https://aitestkitchen.withgoogle.com/tools/music-fx" },
    { text: "Android Apps", tooltip: "Discover Android Apps", url: "apk_files.html" },
    { text: "LimeWire", tooltip: "Create Music with LimeWire", url: "https://limewire.com/studio/audio/create-music" },
    { text: "MusicGen", tooltip: "Explore MusicGen", url: "https://huggingface.co/spaces/facebook/MusicGen" },
    { text: "Hotbot", tooltip: "Search with Hotbot", url: "https://hotbot.com" },
    { text: "Grok", tooltip: "Discover Grok AI", url: "https://grok.com/" }
  ];

  const ctaContainer = ctaContainerEl;
  const searchInput = searchInputEl;
  let soundEnabled = true;

  // Function to create a button
  function createButton(data) {
    const button = document.createElement("button");
    button.className = "cta-button";
    button.innerHTML = data.text;

    const tooltipSpan = document.createElement("span");
    tooltipSpan.className = "cta-tooltip";
    tooltipSpan.innerHTML = data.tooltip;
    button.appendChild(tooltipSpan);

    button.addEventListener("click", () => {
      if (soundEnabled) playSound("click");
      window.open(data.url, "_blank");
    });

    button.addEventListener("mouseenter", () => {
      if (soundEnabled) playSound("hover");
      // Change color scheme on hover
      const root = document.documentElement;
      const currentColor = getComputedStyle(root).getPropertyValue('--ultra-color');
      const newColor = currentColor === '#00ff95' ? '#ff00de' : '#00ff95';
      root.style.setProperty('--ultra-color', newColor);
    });

    return button;
  }

  // Function to render buttons
  function renderButtons(buttons) {
    ctaContainer.innerHTML = "";
    buttons.forEach(data => {
      ctaContainer.appendChild(createButton(data));
    });
  }

  // Initial render
  renderButtons(buttonsData);

  // Search functionality
  searchInput.addEventListener("input", () => {
    const searchTerm = searchInput.value.toLowerCase();
    const filteredButtons = buttonsData.filter(data => 
      data.text.toLowerCase().includes(searchTerm) || 
      data.tooltip.toLowerCase().includes(searchTerm)
    );
    renderButtons(filteredButtons);
  });

  // Generate stars for the background
  const cosmicBg = document.querySelector(".cosmic-bg");
  for (let i = 0; i < 300; i++) {
    const star = document.createElement("div");
    star.className = "star";
    star.style.top = `${Math.random() * 100}%`;
    star.style.left = `${Math.random() * 100}%`;
    star.style.animationDelay = `${Math.random() * 5}s`;
    cosmicBg.appendChild(star);
  }

  // Sound effects
  const audioContext = new (window.AudioContext || window.webkitAudioContext)();

  function playSound(type) {
    const oscillator = audioContext.createOscillator();
    const gainNode = audioContext.createGain();

    oscillator.connect(gainNode);
    gainNode.connect(audioContext.destination);

    switch(type) {
      case "hover":
        oscillator.frequency.setValueAtTime(2000, audioContext.currentTime);
        gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
        oscillator.start();
        oscillator.stop(audioContext.currentTime + 0.1);
        break;
      case "click":
        oscillator.frequency.setValueAtTime(1500, audioContext.currentTime);
        gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
        oscillator.start();
        oscillator.stop(audioContext.currentTime + 0.15);
        break;
    }
  }
</script>
