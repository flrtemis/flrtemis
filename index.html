<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Interactive CTA Buttons</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --ultra-color: #00ff95;
    --ultra-dark: #000;
    --ultra-glow: rgba(0, 255, 149, 0.3);
    --ultra-shadow: rgba(0, 255, 149, 0.5);
  }

  body {
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: var(--ultra-dark);
    font-family: 'Orbitron', sans-serif;
    color: #fff;
    overflow: hidden;
  }

  .header {
    margin-bottom: 20px;
    text-align: center;
  }

  .header h1 {
    font-size: 2.5rem;
    text-shadow: 0 0 20px var(--ultra-color), 0 0 40px var(--ultra-color);
  }

  .cta-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 20px;
    width: 90%;
    max-width: 1200px;
  }

  .cta-button {
    padding: 15px 20px;
    border: 2px solid var(--ultra-color);
    background: transparent;
    color: var(--ultra-color);
    text-transform: uppercase;
    letter-spacing: 2px;
    text-align: center;
    position: relative;
    cursor: pointer;
    transition: all 0.4s ease;
    text-shadow: 0 0 10px var(--ultra-color);
    box-shadow: 0 0 15px var(--ultra-shadow);
  }

  .cta-button:hover {
    background: var(--ultra-color);
    color: var(--ultra-dark);
    text-shadow: none;
    box-shadow: 0 0 20px var(--ultra-shadow), inset 0 0 20px var(--ultra-shadow);
    transform: scale(1.1);
  }

  .cta-tooltip {
    position: absolute;
    bottom: -35px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ultra-color);
    color: var(--ultra-dark);
    padding: 5px 10px;
    border-radius: 5px;
    font-size: 12px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  .cta-button:hover .cta-tooltip {
    opacity: 1;
  }

  .cosmic-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, #000, #1a292c);
    z-index: -1;
  }

  .star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: #fff;
    border-radius: 50%;
    animation: twinkle 5s infinite ease-in-out;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }
</style>
</head>
<body>
<div class="cosmic-bg"></div>

<header class="header">
  <h1>Modern Interactive Buttons</h1>
</header>

<div class="cta-container" id="cta-container"></div>

<script>
  // List of all 21 CTA buttons with tooltips and URLs
  const buttonsData = [
    { text: "Watch Cartoons", tooltip: "Go to WCOFun", url: "https://www.wcofun.net/" },
    { text: "Google Translate", tooltip: "Translate Languages", url: "https://translate.google.com" },
    { text: "Melodysheep", tooltip: "Visit Melodysheep YouTube", url: "https://www.youtube.com/@melodysheep" },
    { text: "GitHub", tooltip: "Visit GitHub Profile", url: "https://github.com/flrtemis" },
    { text: "ChatGPT", tooltip: "Open ChatGPT", url: "https://chatgpt.com/" },
    { text: "YouTube", tooltip: "Go to YouTube", url: "https://www.youtube.com" },
    { text: "APKMirror", tooltip: "Download APKs", url: "https://www.apkmirror.com/" },
    { text: "APKPure", tooltip: "Explore APKPure", url: "https://apkpure.com/" },
    { text: "MODYOLO", tooltip: "Visit MODYOLO", url: "https://modyolo.com/apps" },
    { text: "Uptodown", tooltip: "Discover Uptodown", url: "https://en.uptodown.com" },
    { text: "Temporary Number", tooltip: "Use Temporary Numbers", url: "https://quackr.io/temporary-numbers/united-states" },
    { text: "Temporary Email", tooltip: "Access Temp Mail", url: "https://temp-mail.org/en/" },
    { text: "Branch Education", tooltip: "Visit Branch Education", url: "https://branch.education/" },
    { text: "Convai", tooltip: "Create with Convai", url: "https://convai.com/pipeline/create-character" },
    { text: "Crushon AI", tooltip: "Explore Crushon AI", url: "https://crushon.ai" },
    { text: "MusicFX", tooltip: "Try Google MusicFX", url: "https://aitestkitchen.withgoogle.com/tools/music-fx" },
    { text: "Android Apps", tooltip: "Discover Android Apps", url: "apk_files.html" },
    { text: "LimeWire", tooltip: "Create Music with LimeWire", url: "https://limewire.com/studio/audio/create-music" },
    { text: "MusicGen", tooltip: "Explore MusicGen", url: "https://huggingface.co/spaces/facebook/MusicGen" },
    { text: "Hotbot", tooltip: "Search with Hotbot", url: "https://hotbot.com" },
    { text: "Grok", tooltip: "Discover Grok AI", url: "https://grok.com/" }
  ];

  const ctaContainer = document.getElementById("cta-container");

  // Dynamically generate buttons
  buttonsData.forEach(({ text, tooltip, url }) => {
    const button = document.createElement("button");
    button.className = "cta-button";
    button.innerHTML = text;

    // Add tooltip
    const tooltipSpan = document.createElement("span");
    tooltipSpan.className = "cta-tooltip";
    tooltipSpan.innerHTML = tooltip;
    button.appendChild(tooltipSpan);

    // Add click event
    button.addEventListener("click", () => {
      window.open(url, "_blank");
    });

    ctaContainer.appendChild(button);
  });

  // Generate stars for the background
  const cosmicBg = document.querySelector(".cosmic-bg");
  for (let i = 0; i < 300; i++) {
    const star = document.createElement("div");
    star.className = "star";
    star.style.top = `${Math.random() * 100}%`;
    star.style.left = `${Math.random() * 100}%`;
    cosmicBg.appendChild(star);
  }
</script>
</body>
</html>
