<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive 3D Android Phone</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
  <style>
    body, html { margin: 0; overflow: hidden; height: 100%; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script>
    let scene, camera, renderer;
    let phoneMesh;
    let mouseX = 0, mouseY = 0;
    let isMouseDown = false;
    let lastMouseX = 0, lastMouseY = 0;

    function init() {
      // Scene setup
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      renderer = new THREE.WebGLRenderer();
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      // Create the 3D Android phone (a simple rectangular box)
      const phoneGeometry = new THREE.BoxGeometry(1, 2, 0.1); // Width, Height, Depth
      const phoneMaterial = new THREE.MeshBasicMaterial({ color: 0x4CAF50 }); // Android green
      phoneMesh = new THREE.Mesh(phoneGeometry, phoneMaterial);
      scene.add(phoneMesh);

      // Set camera position to view the phone
      camera.position.z = 5;

      // Add event listeners for mouse interaction
      document.addEventListener('mousedown', onMouseDown, false);
      document.addEventListener('mousemove', onMouseMove, false);
      document.addEventListener('mouseup', onMouseUp, false);
      document.addEventListener('mouseleave', onMouseUp, false);

      animate();
    }

    function onMouseDown(event) {
      isMouseDown = true;
      lastMouseX = event.clientX;
      lastMouseY = event.clientY;
    }

    function onMouseMove(event) {
      if (isMouseDown) {
        let deltaX = event.clientX - lastMouseX;
        let deltaY = event.clientY - lastMouseY;

        // Update camera rotation based on mouse movement
        mouseX += deltaX * 0.005;
        mouseY -= deltaY * 0.005;

        // Rotate camera around the phone
        camera.position.x = Math.sin(mouseX) * 5;
        camera.position.z = Math.cos(mouseX) * 5;
        camera.position.y = Math.sin(mouseY) * 2;
        camera.lookAt(phoneMesh.position);

        lastMouseX = event.clientX;
        lastMouseY = event.clientY;
      }
    }

    function onMouseUp() {
      isMouseDown = false;
    }

    function animate() {
      requestAnimationFrame(animate);

      // Rotate phone itself (for visual effect)
      phoneMesh.rotation.y += 0.01;

      // Render the scene from the perspective of the camera
      renderer.render(scene, camera);
    }

    // Initialize the scene
    init();
  </script>
</body>
</html>
