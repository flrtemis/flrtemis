<html style="--ultra-color: #00ff95;">
  <head></head>
  <body>
    <header class="header">
      <h1>⩘Ꝛ𝘛𝕰𝘔𝘐Ⲋ™</h1>
    </header>

    <div class="cta-container" id="ctaContainerEl">
      <button class="cta-button">Watch Cartoons</button>
      <button class="cta-button">Google Translate</button>
      <button class="cta-button">Melodysheep</button>
      <button class="cta-button">GitHub</button>
      <button class="cta-button">ChatGPT</button>
      <button class="cta-button">YouTube</button>
      <button class="cta-button">APKMirror</button>
      <button class="cta-button">APKPure</button>
      <button class="cta-button">MODYOLO</button>
      <button class="cta-button">Uptodown</button>
      <button class="cta-button">Temporary Number</button>
      <button class="cta-button">Temporary Email</button>
      <button class="cta-button">Branch Education</button>
      <button class="cta-button">Convai</button>
      <button class="cta-button">Crushon AI</button>
      <button class="cta-button">MusicFX</button>
      <button class="cta-button">Android Apps</button>
      <button class="cta-button">LimeWire</button>
      <button class="cta-button">MusicGen</button>
      <button class="cta-button">Hotbot</button>
      <button class="cta-button">Grok</button>
    </div>

    <style>
      :root {
        --ultra-color: #00ff95;
        --ultra-dark: #000;
        --ultra-glow: rgba(0, 255, 149, 0.3);
        --ultra-shadow: rgba(0, 255, 149, 0.5);
      }

      body {
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: var(--ultra-dark);
        font-family: 'Orbitron', sans-serif;
        color: #fff;
        overflow: hidden;
      }

      .header {
        margin-bottom: 20px;
        text-align: center;
      }

      .header h1 {
        font-size: 2.5rem;
        text-shadow: 0 0 20px var(--ultra-color), 0 0 40px var(--ultra-color);
        animation: pulsate 2s infinite alternate;
      }

      .controls {
        display: flex;
        justify-content: center;
        margin-bottom: 20px;
      }

      .controls button {
        padding: 10px;
        margin: 0 5px;
        background: var(--ultra-color);
        color: var(--ultra-dark);
        border: none;
        cursor: pointer;
        transition: background-color 0.3s ease, transform 0.3s ease;
      }

      .controls button:hover {
        transform: scale(1.1);
        box-shadow: 0 0 15px var(--ultra-shadow);
      }

      .cta-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        width: 90%;
        max-width: 1200px;
      }

      .cta-button {
        padding: 15px 20px;
        border: 2px solid var(--ultra-color);
        background: transparent;
        color: var(--ultra-color);
        text-transform: uppercase;
        letter-spacing: 2px;
        text-align: center;
        position: relative;
        cursor: pointer;
        transition: all 0.4s ease;
        text-shadow: 0 0 10px var(--ultra-color);
        box-shadow: 0 0 15px var(--ultra-shadow);
        overflow: hidden;
      }

      .cta-button::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(120deg, transparent, var(--ultra-glow), transparent);
        transition: all 0.4s;
      }

      .cta-button:hover::before {
        left: 100%;
      }

      .cta-button:hover {
        background: var(--ultra-color);
        color: var(--ultra-dark);
        text-shadow: none;
        box-shadow: 0 0 20px var(--ultra-shadow), inset 0 0 20px var(--ultra-shadow);
        transform: scale(1.1) rotate(3deg);
      }

      @media (max-width: 768px) {
        .cta-container {
          grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        }
        .header h1 {
          font-size: 2rem;
        }
        .controls {
          flex-direction: column;
          align-items: center;
        }
      }
    </style>

    <script>
      const buttonsData = [
        { text: "Watch Cartoons", url: "https://www.wcofun.net/" },
        { text: "Google Translate", url: "https://translate.google.com" },
        { text: "Melodysheep", url: "https://www.youtube.com/@melodysheep" },
        { text: "GitHub", url: "https://github.com/flrtemis" },
        { text: "ChatGPT", url: "https://chatgpt.com/" },
        { text: "YouTube", url: "https://www.youtube.com" },
        { text: "APKMirror", url: "https://www.apkmirror.com/" },
        { text: "APKPure", url: "https://apkpure.com/" },
        { text: "MODYOLO", url: "https://modyolo.com/apps" },
        { text: "Uptodown", url: "https://en.uptodown.com" },
        { text: "Temporary Number", url: "https://quackr.io/temporary-numbers/united-states" },
        { text: "Temporary Email", url: "https://temp-mail.org/en/" },
        { text: "Branch Education", url: "https://branch.education/" },
        { text: "Convai", url: "https://convai.com/pipeline/create-character" },
        { text: "Crushon AI", url: "https://crushon.ai" },
        { text: "MusicFX", url: "https://aitestkitchen.withgoogle.com/tools/music-fx" },
        { text: "Android Apps", url: "apk_files.html" },
        { text: "LimeWire", url: "https://limewire.com/studio/audio/create-music" },
        { text: "MusicGen", url: "https://huggingface.co/spaces/facebook/MusicGen" },
        { text: "Hotbot", url: "https://hotbot.com" },
        { text: "Grok", url: "https://grok.com/" }
      ];

      const ctaContainer = ctaContainerEl;

      // Function to handle color change on hover
      function handleColorChange() {
        const root = document.documentElement;
        const newColor = lastHoveredColor === '#00ff95' ? '#ff00de' : '#00ff95';
        root.style.setProperty('--ultra-color', newColor);
        lastHoveredColor = newColor;
      }

      // Function to create a button
      function createButton(data) {
        const button = document.createElement("button");
        button.className = "cta-button";
        button.innerHTML = data.text;

        button.addEventListener("click", () => {
          window.open(data.url, "_blank");
        });

        button.addEventListener("mouseenter", () => {
          handleColorChange();  // Change color on hover
        });

        return button;
      }

      // Function to render buttons
      function renderButtons(buttons) {
        ctaContainer.innerHTML = "";
        buttons.forEach(data => {
          ctaContainer.appendChild(createButton(data));
        });
      }

      // Initial render
      renderButtons(buttonsData);
    </script>
  </body>
</html>
