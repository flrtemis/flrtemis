<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>360° Interactive Buttons</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.133.1';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.133.1/examples/jsm/controls/OrbitControls.js';

        let scene, camera, renderer, controls;

        const buttons = [
            "Watch Cartoons Online", "Google Translate", "melodysheep", "GitHub", "ChatGPT", "YouTube", "APKMirror", "APKPure", "MODYOLO", "uptodown",
            "Temporary Number", "Temporary Email", "Branch Education", "Convai", "Crushon AI", "MusicFX", "Android Apps", "LimeWire", "MusicGen", "Hotbot", "Grok"
        ];

        const websites = [
            "https://www.wcofun.net/", "https://www.google.com/search?q=english+to+spanish&source=hp&iflsig=AL9hbdgAAAAAZyGMPLvkd73HmTflqSYJdlVSvmh1LNVj&oq=english+", "https://www.youtube.com/@melodysheep",
            "https://github.com/flrtemis", "https://chatgpt.com/", "https://www.youtube.com/@flrtemis",
            "https://www.apkmirror.com/", "https://apkpure.com/", "https://modyolo.com/apps",
            "https://en.uptodown.com", "https://quackr.io/temporary-numbers/united-states", "https://temp-mail.org/en/",
            "https://branch.education/", "https://convai.com/pipeline/create-character", "https://crushon.ai",
            "https://aitestkitchen.withgoogle.com/tools/music-fx", "apk_files.html", "https://limewire.com/studio/audio/create-music",
            "https://huggingface.co/spaces/facebook/MusicGen", "https://hotbot.com", "https://grok.com/"
        ];

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.enableZoom = true;
            controls.enablePan = false;

            // Background
            const loader = new THREE.TextureLoader();
            loader.load('https://i.imgur.com/78n8zls.jpg', function(texture) {
                scene.background = texture;
            });

            // Create buttons in a circle around the camera
            const radius = 3;
            for (let i = 0; i < buttons.length; i++) {
                const angle = (i / buttons.length) * Math.PI * 2;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;

                const geometry = new THREE.BoxGeometry(0.5, 0.2, 0.1);
                const material = new THREE.MeshBasicMaterial({ color: 0x00ff41 });
                const button = new THREE.Mesh(geometry, material);
                button.position.set(x, 0, z);
                button.lookAt(camera.position);
                button.userData = { index: i };  // Store index for click handling
                scene.add(button);

                // Text for buttons
                const textLoader = new THREE.FontLoader();
                textLoader.load('https://threejs.org/examples/fonts/helvetiker_regular.typeface.json', function (font) {
                    const textGeometry = new THREE.TextGeometry(buttons[i], {
                        font: font,
                        size: 0.05,
                        height: 0,
                        curveSegments: 4,
                        bevelEnabled: false
                    });
                    const textMaterial = new THREE.MeshBasicMaterial({ color: 0x000000 });
                    const textMesh = new THREE.Mesh(textGeometry, textMaterial);
                    textMesh.position.set(button.position.x, button.position.y + 0.3, button.position.z);
                    textMesh.lookAt(camera.position);
                    scene.add(textMesh);
                });

                // Add click event listener
                button.addEventListener('click', function(event) {
                    event.preventDefault();
                    window.location.href = websites[this.userData.index];
                });
            }

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }, false);

        init();
    </script>
</body>
</html>
