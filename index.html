<title>Ultra Cool CTA Buttons</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

  :root {
    --ultra-color: #00ff95;
    --ultra-dark: #000;
    --ultra-glow: rgba(0, 255, 149, 0.3);
    --ultra-shadow: rgba(0, 255, 149, 0.5);
  }

  body {
    margin: 0;
    padding: 0;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: var(--ultra-dark);
    overflow: hidden;
    font-family: 'Orbitron', sans-serif;
    color: #fff;
  }

  .ultra-cta {
    margin: 20px;
    padding: 20px 40px;
    position: relative;
    font-size: 16px;
    color: var(--ultra-color);
    text-transform: uppercase;
    letter-spacing: 4px;
    text-shadow: 0 0 20px var(--ultra-color), 0 0 40px var(--ultra-color), 0 0 60px var(--ultra-color);
    border: 2px solid var(--ultra-color);
    background: transparent;
    cursor: pointer;
    transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 0 10px var(--ultra-shadow), inset 0 0 10px var(--ultra-shadow);
    animation: pulse 5s ease-in-out infinite;
  }

  .ultra-cta::before, .ultra-cta::after {
    content: '';
    position: absolute;
    top: -2px; left: -2px;
    right: -2px; bottom: -2px;
    background: linear-gradient(45deg, var(--ultra-glow), transparent);
    opacity: 0;
    transition: opacity 0.3s;
    z-index: -1;
  }

  .ultra-cta::after {
    background: linear-gradient(-45deg, var(--ultra-glow), transparent);
  }

  .ultra-cta:hover {
    transform: scale(1.1) rotate(3deg);
    text-shadow: 0 0 30px var(--ultra-color), 0 0 50px var(--ultra-color), 0 0 70px var(--ultra-color);
    border-color: var(--ultra-color);
  }

  .ultra-cta:hover::before, .ultra-cta:hover::after {
    opacity: 1;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 10px var(--ultra-shadow), inset 0 0 10px var(--ultra-shadow); }
    50% { box-shadow: 0 0 20px var(--ultra-shadow), inset 0 0 20px var(--ultra-shadow); }
  }

  /* Glitchy Text Effect */
  .glitch-text {
    position: relative;
    display: inline-block;
  }

  .glitch-text::before, .glitch-text::after {
    content: attr(data-text);
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    background: var(--ultra-dark);
    clip-path: inset(0 0 0 0);
    color: var(--ultra-color);
  }

  .glitch-text::before {
    left: 2px;
    text-shadow: -2px 0 var(--ultra-color);
    animation: glitch-anim 2s infinite linear alternate-reverse;
  }

  .glitch-text::after {
    left: -2px;
    text-shadow: -2px 0 var(--ultra-color);
    animation: glitch-anim 3s infinite linear alternate-reverse;
  }

  @keyframes glitch-anim {
    0% { clip-path: inset(73% 0 19% 0); }
    5% { clip-path: inset(41% 0 55% 0); }
    10% { clip-path: inset(66% 0 23% 0); }
    15% { clip-path: inset(50% 0 26% 0); }
    20% { clip-path: inset(32% 0 55% 0); }
    25% { clip-path: inset(86% 0 13% 0); }
    30% { clip-path: inset(82% 0 16% 0); }
    35% { clip-path: inset(69% 0 15% 0); }
    40% { clip-path: inset(53% 0 18% 0); }
    45% { clip-path: inset(27% 0 64% 0); }
    50% { clip-path: inset(51% 0 27% 0); }
    55% { clip-path: inset(14% 0 72% 0); }
    60% { clip-path: inset(100% 0 0 0); }
    100% { clip-path: inset(0 0 100% 0); }
  }

  /* Cosmic Background */
  .cosmic-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, #000, #1a292c);
    z-index: -2;
  }

  .star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: #fff;
    border-radius: 50%;
    animation: twinkle 5s infinite ease-in-out;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  @keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
</style>
</head>
